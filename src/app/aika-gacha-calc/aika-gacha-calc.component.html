<div class="aika-gacha-calc">
    <div class="control-panel">
        <div class="control-buttons-wrapper">
            <div class="control-buttons">
                <button (click)="selectAll()">全選</button>
                <button (click)="selectNone()">取消全選</button>
                <button (click)="invertSelection()">反選</button>
                <button (click)="clearSavedSelection()" title="清除儲存的選擇記錄">清除儲存</button>
                <button (click)="copyShareUrl()" title="複製分享網址到剪貼簿">複製分享網址</button>
                <p>shift多選/取消 - 依照第一個選擇的角色(橘框)</p>
            </div>
        </div>
        <div class="selection-info-fixed">
            <span class="selection-info">{{selectedCharacterId.size}} / {{filteredCharacterModels.length}} ({{getSelectionPercentage()}}%)</span>
        </div>
    </div>
    <div class="filter-panel">
        <label>
            <input type="checkbox" [(ngModel)]="filterSettings.home" (change)="onFilterChange()">
            <span>本家</span>
        </label>
        <label>
            <input type="checkbox" [(ngModel)]="filterSettings.collabo" (change)="onFilterChange()">
            <span>聯動</span>
        </label>
        <label>
            <input type="checkbox" [(ngModel)]="filterSettings.normal" (change)="onFilterChange()">
            <span>一般</span>
        </label>
        <label>
            <input type="checkbox" [(ngModel)]="filterSettings.another" (change)="onFilterChange()">
            <span>AN</span>
        </label>
        <label>
            <input type="checkbox" [(ngModel)]="filterSettings.factor" (change)="onFilterChange()">
            <span>FA</span>
        </label>
        <label>
            <input type="checkbox" [(ngModel)]="filterSettings.stellar" (change)="onFilterChange()">
            <span>ST</span>
        </label>
        <label>
            <input type="checkbox" [(ngModel)]="filterSettings.volt" (change)="onFilterChange()">
            <span [style.color]="getAttrTypeColor('volt')">電擊</span>
        </label>
        <label>
            <input type="checkbox" [(ngModel)]="filterSettings.gravity" (change)="onFilterChange()">
            <span [style.color]="getAttrTypeColor('gravity')">重力</span>
        </label>
        <label>
            <input type="checkbox" [(ngModel)]="filterSettings.fire" (change)="onFilterChange()">
            <span [style.color]="getAttrTypeColor('fire')">燒夷</span>
        </label>
        <label>
            <input type="checkbox" [(ngModel)]="filterSettings.ice" (change)="onFilterChange()">
            <span [style.color]="getAttrTypeColor('ice')">冷擊</span>
        </label>
    </div>
    <div class="character-list">
        <div class="character" *ngFor="let cm of filteredCharacterModels"
        [ngClass]="{
            'selected': selectedCharacterId.has(cm.cid),
            'shift-anchor': isLastSelectedCharacter(cm)
        }"
        (click)="toggleSelectCharacter(cm, $event)"
        (mouseenter)="onCharacterMouseEnter(cm)"
        (mouseleave)="onCharacterMouseLeave()"
        (contextmenu)="preventDefault($event)"
        (dblclick)="preventDefault($event)"
        (touchstart)="onTouchStart($event)"
        (touchend)="onTouchEnd($event)"
        [title]="cm.name + (checkIsCollaboCharacter(cm) ? ' (Collabo)' : '')">
            <!-- w192, h360 -->
            <img class="picture" *ngIf="getCharacterPicture(cm)"
                 [src]="getCharacterPicture(cm)?.imageUrl"
                 (contextmenu)="preventDefault($event)"
                 (dragstart)="preventDefault($event)"
                 draggable="false" />
            <span class="name">{{cm.name}}</span>
        </div>
    </div>
</div>
